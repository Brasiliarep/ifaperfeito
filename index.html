
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <script type="importmap">
    {
      "imports": {
        "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
        "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.3",
        "react/": "https://esm.sh/react@^19.2.4/",
        "react": "https://esm.sh/react@^19.2.4",
        "@google/genai": "https://esm.sh/@google/genai@^1.40.0",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "vite": "https://esm.sh/vite@^7.3.1",
        "jszip": "https://esm.sh/jszip@^3.10.1",
        "@capacitor/cli": "https://esm.sh/@capacitor/cli@^8.0.2"
      }
    }
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1510" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ifá Oluwo">
    
    <title>Ifá Oluwo - Codex Sacerdotal</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: ['class', '[data-theme="dark"]'],
        theme: {
          extend: {
            fontFamily: {
              serif: ['Cinzel', 'serif'],
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              'ifa-base': 'var(--color-bg)',
              'ifa-base-dark': 'var(--color-bg-dark)',
              'ifa-surface': 'var(--color-surface)',
              'ifa-gold': 'var(--color-gold)',
              'ifa-gold-light': 'var(--color-gold-light)',
              'ifa-gold-dark': 'var(--color-gold-dark)',
              'ifa-green': 'var(--color-green)',
              'ifa-green-light': 'var(--color-green-light)',
              'ifa-wood': 'var(--color-wood)',
              'ifa-neutral': 'var(--color-neutral)',
              'ifa-text': 'var(--color-text)',
              'ifa-text-light': 'var(--color-text-light)',
              'ifa-border': 'var(--color-border)',
            },
            padding: {
              'safe-top': 'env(safe-area-inset-top)',
              'safe-bottom': 'env(safe-area-inset-bottom)',
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --color-bg: #09060a;
        --color-bg-alt: #0d1a12;
        --color-surface: rgba(255,255,255,0.045);
        --color-gold: #e8c84a;
        --color-gold-light: #d4a82a;
        --color-gold-dark: #c8a028;
        --color-green: #14a050;
        --color-green-light: #3cc878;
        --color-wood: #5D4037;
        --color-neutral: #a8a29e;
        --color-text: #F5F5DC;
        --color-text-light: #e5e5e5;
        --color-border: rgba(200,160,40,0.22);
        --color-glass-bg: rgba(255,255,255,0.045);
        --color-glass-border: rgba(200,160,40,0.22);
        --sat: env(safe-area-inset-top);
        --sab: env(safe-area-inset-bottom);
      }
      body {
        background: linear-gradient(135deg, #09060a, #0d1a12);
        color: var(--color-text-light);
        overscroll-behavior-y: none;
        font-family: 'Inter', sans-serif;
        font-variant-numeric: tabular-nums;
      }
      ::selection {
        background: rgba(200,160,40,0.25);
      }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(200,160,40,0.3); border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(200,160,40,0.5); }

      /* Focus ring */
      *:focus-visible {
        outline: none;
        box-shadow: 0 0 0 2px rgba(200,160,40,0.4);
        border-radius: 8px;
      }

      /* ========== HALOS & TEXTURA ========== */
      #root {
        position: relative;
        min-height: 100vh;
        overflow-x: hidden;
      }
      #root::before {
        content: '';
        position: fixed;
        top: -30%;
        left: -15%;
        width: 70vw;
        height: 70vw;
        background: radial-gradient(circle, rgba(180,130,20,0.15) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
      }
      #root::after {
        content: '';
        position: fixed;
        bottom: -20%;
        right: -10%;
        width: 60vw;
        height: 60vw;
        background: radial-gradient(circle, rgba(20,100,55,0.12) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
      }

      /* ========== GLASS CARD ========== */
      .glass-card {
        background: rgba(255,255,255,0.045);
        backdrop-filter: blur(16px) saturate(1.4);
        -webkit-backdrop-filter: blur(16px) saturate(1.4);
        border: 0.5px solid rgba(200,160,40,0.22);
        border-radius: 16px;
        box-shadow: inset 0 1px 0 rgba(255,220,80,0.1), 0 8px 32px rgba(0,0,0,0.4);
        position: relative;
        transition: all 0.18s ease;
      }
      .glass-card::after {
        content: '';
        position: absolute;
        top: 0;
        left: 10%;
        right: 10%;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(232,200,74,0.55), transparent);
        opacity: 0;
        transition: opacity 0.18s ease;
        pointer-events: none;
      }
      .glass-card:hover::after {
        opacity: 1;
      }
      .glass-card:hover {
        background: rgba(255,255,255,0.065);
        border-color: rgba(200,160,40,0.35);
      }

      /* ========== GLASS VARIANTS ========== */
      .glass-gold {
        background: linear-gradient(135deg, rgba(160,110,10,0.55), rgba(200,160,30,0.3));
        border-color: rgba(200,160,40,0.40);
        box-shadow: inset 0 1px 0 rgba(255,220,80,0.15), 0 4px 30px rgba(180,130,20,0.25);
      }
      .glass-gold::after {
        background: linear-gradient(90deg, transparent, rgba(232,200,74,0.7), transparent);
      }
      .glass-gold:hover {
        background: linear-gradient(135deg, rgba(160,110,10,0.65), rgba(200,160,30,0.4));
        box-shadow: inset 0 1px 0 rgba(255,220,80,0.2), 0 8px 40px rgba(180,130,20,0.35);
      }

      .glass-green {
        background: linear-gradient(135deg, rgba(20,60,35,0.65), rgba(15,80,45,0.4));
        border-color: rgba(20,160,80,0.25);
        box-shadow: inset 0 1px 0 rgba(60,200,120,0.1), 0 4px 24px rgba(20,160,80,0.15);
      }
      .glass-green::after {
        background: linear-gradient(90deg, transparent, rgba(20,160,80,0.5), transparent);
      }
      .glass-green:hover {
        background: linear-gradient(135deg, rgba(20,60,35,0.75), rgba(15,80,45,0.5));
        box-shadow: inset 0 1px 0 rgba(60,200,120,0.15), 0 8px 32px rgba(20,160,80,0.25);
      }

      .glass-blue {
        background: rgba(15,25,65,0.65);
        border-color: rgba(50,80,200,0.22);
        box-shadow: inset 0 1px 0 rgba(80,120,255,0.1), 0 8px 32px rgba(0,0,0,0.4);
      }
      .glass-blue::after {
        background: linear-gradient(90deg, transparent, rgba(80,120,255,0.4), transparent);
      }
      .glass-blue:hover {
        background: rgba(15,25,65,0.75);
      }

      .glass-terra {
        background: rgba(50,30,8,0.65);
        border-color: rgba(160,100,15,0.22);
        box-shadow: inset 0 1px 0 rgba(200,160,40,0.08), 0 8px 32px rgba(0,0,0,0.4);
      }
      .glass-terra::after {
        background: linear-gradient(90deg, transparent, rgba(200,160,40,0.35), transparent);
      }
      .glass-terra:hover {
        background: rgba(50,30,8,0.75);
      }

      .glass-purple {
        background: rgba(40,10,35,0.55);
        border-color: rgba(120,40,100,0.25);
        box-shadow: inset 0 1px 0 rgba(160,60,140,0.08), 0 8px 32px rgba(0,0,0,0.4);
      }
      .glass-purple::after {
        background: linear-gradient(90deg, transparent, rgba(160,60,140,0.35), transparent);
      }
      .glass-purple:hover {
        background: rgba(40,10,35,0.65);
      }

      /* ========== MINI GLASS ========== */
      .glass-mini {
        background: rgba(255,255,255,0.045);
        backdrop-filter: blur(16px) saturate(1.4);
        -webkit-backdrop-filter: blur(16px) saturate(1.4);
        border: 0.5px solid rgba(200,160,40,0.22);
        border-radius: 16px;
        box-shadow: inset 0 1px 0 rgba(255,220,80,0.1), 0 4px 16px rgba(0,0,0,0.3);
        position: relative;
        transition: all 0.18s ease;
      }
      .glass-mini::after {
        content: '';
        position: absolute;
        top: 0;
        left: 20%;
        right: 20%;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(232,200,74,0.35), transparent);
        opacity: 0;
        transition: opacity 0.18s ease;
        pointer-events: none;
      }
      .glass-mini:hover::after {
        opacity: 1;
      }
      .glass-mini:hover {
        background: rgba(255,255,255,0.07);
        border-color: rgba(200,160,40,0.3);
        transform: translateY(-2px);
      }

      /* ========== SIDEBAR ========== */
      .glass-sidebar {
        background: rgba(255,255,255,0.02);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-right: 0.5px solid rgba(200,160,40,0.08);
      }

      /* ========== TOPBAR ========== */
      .glass-topbar {
        background: rgba(255,255,255,0.02);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-bottom: 0.5px solid rgba(200,160,40,0.12);
      }

      /* ========== GLASS BUTTON ========== */
      .glass-btn {
        background: rgba(255,255,255,0.04);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 0.5px solid rgba(200,160,40,0.18);
        border-radius: 8px;
        transition: all 0.18s ease;
      }
      .glass-btn:hover {
        background: rgba(255,255,255,0.08);
        border-color: rgba(200,160,40,0.3);
      }

      /* ========== FAB ========== */
      .fab-gold {
        background: linear-gradient(135deg, rgba(180,130,20,0.92), rgba(220,170,30,0.8));
        border: 0.5px solid rgba(200,160,40,0.4);
        border-radius: 9999px;
        box-shadow: 0 4px 24px rgba(180,130,20,0.45);
        color: #1a0f00;
        font-family: 'Inter', sans-serif;
        font-weight: 600;
        transition: all 0.18s ease;
      }
      .fab-gold:hover {
        box-shadow: 0 8px 40px rgba(180,130,20,0.6);
        transform: translateY(-1px);
      }
      /* Pulse only on glow, not button */
      @keyframes fab-pulse-glow {
        0%, 100% { box-shadow: 0 4px 24px rgba(180,130,20,0.45); }
        50% { box-shadow: 0 4px 40px rgba(180,130,20,0.7); }
      }
      .fab-gold {
        animation: fab-pulse-glow 3s ease-in-out infinite;
      }

      /* ========== SECTION LABEL ========== */
      .section-label {
        font-size: 9px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: rgba(232,200,74,0.45);
        font-weight: 600;
        white-space: nowrap;
      }

      /* Legacy styles preserved */
      .btn-raio-ritual {
          width: 45px; 
          height: 45px;
          border-radius: 50%;
          background: radial-gradient(circle, #FFD700, #B8860B);
          border: 2px solid #FFF;
          font-size: 24px;
          box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
          z-index: 50;
          display: flex;
          align-items: center;
          justify-content: center;
          cursor: pointer;
          animation: pulse-gold 2s infinite;
          transition: transform 0.2s;
      }
      .btn-raio-ritual:active {
          transform: scale(0.9);
      }
      .ouvindo-ativo {
          background-color: #28a745 !important;
          border-color: #28a745 !important;
          box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.7);
          animation: respirar 1.5s infinite cubic-bezier(0.66, 0, 0, 1);
      }
      @keyframes respirar {
          0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.7); }
          70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(40, 167, 69, 0); }
          100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(40, 167, 69, 0); }
      }
      @keyframes pulse-gold {
          0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.7); }
          50% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(255, 215, 0, 0); }
          100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); }
      }

      /* --- PRINT STYLES CORRECTION --- */
      @media print {
        body * {
          visibility: hidden; /* Hide everything by default */
        }
        
        /* Elements specifically marked to print become visible */
        .print\:block, 
        .print\:flex,
        #printable-area, 
        #printable-area * {
          visibility: visible;
        }

        /* Ensure modals take full page and flow naturally */
        #printable-modal {
          position: absolute !important;
          left: 0 !important;
          top: 0 !important;
          width: 100% !important;
          height: auto !important;
          overflow: visible !important;
          background: white !important;
          color: black !important;
          z-index: 9999 !important;
          margin: 0 !important;
          padding: 0 !important;
        }

        /* Reset body backgrounds to save ink */
        body {
          background: white !important;
          color: black !important;
          overflow: visible !important;
        }

        /* Hide scrollbars and UI elements */
        ::-webkit-scrollbar { display: none; }
        
        /* Ensure page breaks work */
        .break-before-page { page-break-before: always; }
        .break-inside-avoid { page-break-inside: avoid; }
      }
    </style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./service-worker.js?v=4')
            .then(registration => console.log('SW registered'))
            .catch(err => console.log('SW failed', err));
        });
      }
    </script>
  </body>
</html>
