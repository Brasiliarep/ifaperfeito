    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <title>Ifá Oluwo - Codex Sacerdotal</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: ['class', '[data-theme="dark"]'],
        theme: {
          extend: {
            fontFamily: {
              serif: ['Cinzel', 'serif'],
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              'ifa-base': 'var(--color-bg)',
              'ifa-base-dark': 'var(--color-bg-dark)',
              'ifa-surface': 'var(--color-surface)',
              'ifa-gold': 'var(--color-gold)',
              'ifa-gold-light': 'var(--color-gold-light)',
              'ifa-gold-dark': 'var(--color-gold-dark)',
              'ifa-green': 'var(--color-green)',
              'ifa-green-light': 'var(--color-green-light)',
              'ifa-wood': 'var(--color-wood)',
              'ifa-neutral': 'var(--color-neutral)',
              'ifa-text': 'var(--color-text)',
              'ifa-text-light': 'var(--color-text-light)',
              'ifa-border': 'var(--color-border)',
            },
            padding: {
              'safe-top': 'env(safe-area-inset-top)',
              'safe-bottom': 'env(safe-area-inset-bottom)',
            }
          }
        }
      }
    </script>
    <style>
      :root {
        /* === IFÁ OLUWO 2.0 — DESIGN SYSTEM === */
        /* Paleta */
        --ds-bg:          #070707;
        --ds-surface:     #111111;
        --ds-surface-2:   #161616;
        --ds-border:      rgba(196,158,48,0.18);
        --ds-border-hover:rgba(196,158,48,0.38);
        --ds-gold:        #C49E30;
        --ds-gold-warm:   #E2B84A;
        --ds-gold-glow:   rgba(196,158,48,0.12);
        --ds-gold-ghost:  rgba(196,158,48,0.06);
        --ds-green:       #1E6B45;
        --ds-green-light: #2DB87A;
        --ds-green-ghost: rgba(30,107,69,0.10);

        /* Texto */
        --ds-text-primary:   rgba(255,255,255,0.92);
        --ds-text-secondary: rgba(255,255,255,0.58);
        --ds-text-muted:     rgba(255,255,255,0.32);
        --ds-text-gold:      #C49E30;

        /* Animações */
        --ds-ease:    cubic-bezier(0.25,0.46,0.45,0.94);
        --ds-spring:  cubic-bezier(0.34,1.56,0.64,1);
        --ds-duration: 200ms;

        /* Sidebar */
        --ds-sidebar-w: 220px;

        /* Legado — mantido para compatibilidade com componentes existentes */
        --gold: #e2b84a;
        --gold-dim: rgba(210,165,40,0.55);
        --gold-ghost: rgba(210,165,40,0.12);
        --green: #2db87a;
        --surface: rgba(255,255,255,0.042);
        --border-gold: rgba(210,165,40,0.22);
        --border-white: rgba(255,255,255,0.08);
        --text-muted: rgba(255,255,255,0.38);
        --text-mid: rgba(255,255,255,0.62);
        --text-bright: rgba(255,255,255,0.88);
        --sat: env(safe-area-inset-top);
        --sab: env(safe-area-inset-bottom);
        --color-bg: #070707;
        --color-bg-dark: #050505;
        --color-surface: rgba(255,255,255,0.042);
        --color-gold: #e2b84a;
        --color-gold-light: #f0d060;
        --color-gold-dark: #b89030;
        --color-green: #2db87a;
        --color-green-light: #40e090;
        --color-wood: #a08050;
        --color-neutral: rgba(255,255,255,0.38);
        --color-text: rgba(255,255,255,0.88);
        --color-text-light: rgba(255,255,255,0.62);
        --color-border: rgba(210,165,40,0.22);
      }
      body {
        background: var(--ds-bg);
        color: var(--ds-text-secondary);
        overscroll-behavior-y: none;
        font-family: 'Inter', sans-serif;
        font-variant-numeric: tabular-nums;
        margin: 0;
      }
      ::selection { background: rgba(196,158,48,0.22); }
      ::-webkit-scrollbar { width: 3px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(196,158,48,0.22); border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(196,158,48,0.4); }
      *:focus-visible {
        outline: none;
        box-shadow: 0 0 0 1.5px rgba(196,158,48,0.35);
        border-radius: 8px;
      }

      /* ========== FUNDO: HALOS SAGRADOS + TEXTURA ADIRE ========== */
      #root {
        position: relative;
        min-height: 100vh;
        overflow-x: hidden;
        background:
          radial-gradient(ellipse 60% 50% at 5% 5%, rgba(196,158,48,0.07) 0%, transparent 70%),
          radial-gradient(ellipse 40% 30% at 95% 10%, rgba(30,107,69,0.05) 0%, transparent 60%),
          radial-gradient(ellipse 50% 40% at 50% 100%, rgba(196,158,48,0.04) 0%, transparent 70%),
          var(--ds-bg);
      }
      /* Textura Adire — ultra-discreta */
      #root::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        opacity: 0.012;
        background:
          repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(196,158,48,1) 20px, rgba(196,158,48,1) 21px),
          repeating-linear-gradient(-45deg, transparent, transparent 20px, rgba(196,158,48,1) 20px, rgba(196,158,48,1) 21px);
      }

      /* ======================================================= */
      /* ========== DS 2.0 — COMPONENTES PREMIUM =============== */
      /* ======================================================= */

      /* --- TOPBAR SACERDOTAL --- */
      .ds-topbar {
        background: rgba(7,7,7,0.92);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(196,158,48,0.10);
        position: sticky;
        top: 0;
        z-index: 100;
      }

      /* --- SIDEBAR: COLUNA DO TEMPLO --- */
      .ds-sidebar {
        background: #0A0A0A;
        border-right: 1px solid rgba(196,158,48,0.10);
        width: var(--ds-sidebar-w);
        min-width: var(--ds-sidebar-w);
        display: flex;
        flex-direction: column;
        height: 100vh;
        position: sticky;
        top: 0;
        overflow-y: auto;
        overflow-x: hidden;
        flex-shrink: 0;
        scrollbar-width: none;
      }
      .ds-sidebar::-webkit-scrollbar { display: none; }

      /* Sidebar mobile drawer */
      .ds-sidebar-drawer {
        position: fixed;
        inset: 0;
        z-index: 200;
        display: flex;
      }
      .ds-sidebar-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.65);
        backdrop-filter: blur(4px);
      }
      .ds-sidebar-panel {
        position: relative;
        background: #0A0A0A;
        border-right: 1px solid rgba(196,158,48,0.14);
        width: 260px;
        max-width: 85vw;
        height: 100%;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        animation: ds-slide-in 220ms var(--ds-ease) forwards;
      }
      @keyframes ds-slide-in {
        from { transform: translateX(-100%); }
        to   { transform: translateX(0); }
      }

      /* Sidebar group label */
      .ds-sidebar-group-label {
        font-size: 8.5px;
        letter-spacing: 2.5px;
        text-transform: uppercase;
        color: rgba(196,158,48,0.30);
        padding: 16px 18px 6px;
        white-space: nowrap;
      }

      /* Sidebar item */
      .ds-sidebar-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 18px;
        font-size: 12px;
        color: rgba(255,255,255,0.52);
        cursor: pointer;
        transition: all 180ms var(--ds-ease);
        border-left: 2px solid transparent;
        text-decoration: none;
        white-space: nowrap;
        position: relative;
        background: none;
        border-top: none;
        border-right: none;
        border-bottom: none;
        width: 100%;
        text-align: left;
      }
      .ds-sidebar-item:hover {
        color: rgba(255,255,255,0.82);
        background: rgba(196,158,48,0.04);
        border-left-color: rgba(196,158,48,0.25);
      }
      .ds-sidebar-item.active {
        color: var(--ds-gold-warm);
        background: rgba(196,158,48,0.07);
        border-left-color: var(--ds-gold);
      }
      .ds-sidebar-item .ds-sidebar-badge {
        margin-left: auto;
        background: var(--ds-gold);
        color: #070707;
        font-size: 9px;
        font-weight: 700;
        padding: 1px 5px;
        border-radius: 20px;
        line-height: 1.4;
        min-width: 16px;
        text-align: center;
      }
      .ds-sidebar-item svg {
        flex-shrink: 0;
        opacity: 0.65;
        transition: opacity 180ms var(--ds-ease), transform 180ms var(--ds-ease);
      }
      .ds-sidebar-item:hover svg,
      .ds-sidebar-item.active svg {
        opacity: 1;
        transform: translateX(1px);
      }
      .ds-sidebar-item.active svg { opacity: 1; }

      /* Sidebar divider */
      .ds-sidebar-divider {
        height: 1px;
        background: rgba(196,158,48,0.07);
        margin: 8px 18px;
      }

      /* Sidebar user profile footer */
      .ds-sidebar-profile {
        padding: 12px 14px;
        border-top: 1px solid rgba(196,158,48,0.08);
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        transition: background 180ms var(--ds-ease);
        margin-top: auto;
      }
      .ds-sidebar-profile:hover { background: rgba(196,158,48,0.04); }
      .ds-sidebar-profile-avatar {
        width: 34px; height: 34px;
        border-radius: 50%;
        background: rgba(196,158,48,0.15);
        border: 1px solid rgba(196,158,48,0.30);
        display: flex; align-items: center; justify-content: center;
        font-size: 13px;
        font-weight: 700;
        color: var(--ds-gold-warm);
        flex-shrink: 0;
        font-family: 'Cinzel', serif;
      }

      /* ========== HERO — ATENDIMENTO AO CONSULENTE ========== */
      .ds-hero-card {
        background: var(--ds-surface);
        border: 1px solid rgba(196,158,48,0.20);
        border-radius: 16px;
        position: relative;
        overflow: hidden;
        transition: border-color var(--ds-duration) var(--ds-ease),
                    box-shadow var(--ds-duration) var(--ds-ease);
      }
      /* Linha dourada no topo do hero */
      .ds-hero-card::before {
        content: '';
        position: absolute;
        top: 0; left: 10%; right: 10%;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(196,158,48,0.55), transparent);
        pointer-events: none;
      }
      /* Glow sutil no canto */
      .ds-hero-card::after {
        content: '';
        position: absolute;
        top: -60px; right: -60px;
        width: 200px; height: 200px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(196,158,48,0.06) 0%, transparent 70%);
        pointer-events: none;
      }
      .ds-hero-card:hover {
        border-color: rgba(196,158,48,0.32);
        box-shadow: 0 0 40px rgba(196,158,48,0.06);
      }

      /* Indicador de métrica dentro do hero */
      .ds-metric {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .ds-metric-value {
        font-size: 26px;
        font-weight: 600;
        font-family: 'Cinzel', serif;
        color: var(--ds-gold-warm);
        line-height: 1;
      }
      .ds-metric-label {
        font-size: 9px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: rgba(255,255,255,0.35);
      }

      /* ========== ODU DO DIA — EDITORIAL ========== */
      .ds-odu-editorial {
        background: var(--ds-surface);
        border: 1px solid rgba(196,158,48,0.16);
        border-radius: 16px;
        position: relative;
        overflow: hidden;
        transition: border-color var(--ds-duration) var(--ds-ease);
      }
      .ds-odu-editorial::before {
        content: '';
        position: absolute;
        top: 0; left: 8%; right: 8%;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(196,158,48,0.40), transparent);
        pointer-events: none;
      }
      /* Halo de fundo do odu */
      .ds-odu-halo {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 220px; height: 220px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(196,158,48,0.05) 0%, transparent 70%);
        pointer-events: none;
      }

      /* ========== MODULE CARD ========== */
      .ds-module-card {
        background: var(--ds-surface);
        border: 1px solid rgba(196,158,48,0.12);
        border-radius: 14px;
        padding: 18px 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        cursor: pointer;
        transition:
          transform var(--ds-duration) var(--ds-ease),
          border-color var(--ds-duration) var(--ds-ease),
          box-shadow var(--ds-duration) var(--ds-ease),
          background var(--ds-duration) var(--ds-ease);
        position: relative;
        overflow: hidden;
        text-align: left;
        width: 100%;
      }
      /* Linha topo ao hover */
      .ds-module-card::before {
        content: '';
        position: absolute;
        top: 0; left: 20%; right: 20%;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--ds-card-color, rgba(196,158,48,0.5)), transparent);
        opacity: 0;
        transition: opacity var(--ds-duration) var(--ds-ease);
        pointer-events: none;
      }
      .ds-module-card:hover {
        transform: translateY(-2px);
        background: rgba(17,17,17,0.98);
        border-color: var(--ds-card-color-border, rgba(196,158,48,0.28));
        box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 20px var(--ds-card-glow, rgba(196,158,48,0.08));
      }
      .ds-module-card:hover::before { opacity: 1; }
      .ds-module-card-icon {
        width: 40px; height: 40px;
        border-radius: 10px;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(196,158,48,0.10);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--ds-card-color-icon, rgba(196,158,48,0.8));
        transition: transform 200ms var(--ds-spring), opacity 200ms var(--ds-ease);
        flex-shrink: 0;
      }
      .ds-module-card:hover .ds-module-card-icon {
        transform: scale(1.08) rotate(3deg);
        opacity: 1;
      }
      .ds-module-card-title {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.5px;
        color: rgba(255,255,255,0.82);
        text-transform: uppercase;
        line-height: 1.3;
      }
      .ds-module-card-desc {
        font-size: 10px;
        color: rgba(255,255,255,0.36);
        line-height: 1.5;
        margin-top: -4px;
      }

      /* ========== SECTION DIVIDER ========== */
      .ds-section-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 14px;
      }
      .ds-section-title {
        font-size: 8.5px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: rgba(196,158,48,0.35);
        white-space: nowrap;
        font-family: 'Inter', sans-serif;
      }
      .ds-section-line {
        flex: 1;
        height: 1px;
        background: linear-gradient(90deg, rgba(196,158,48,0.18), transparent);
      }

      /* ========== BUTTONS 2.0 ========== */
      .ds-btn-primary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 11px 24px;
        background: var(--ds-gold);
        color: #070707;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-family: 'Cinzel', serif;
        transition:
          background var(--ds-duration) var(--ds-ease),
          box-shadow var(--ds-duration) var(--ds-ease),
          transform var(--ds-duration) var(--ds-spring);
        position: relative;
        overflow: hidden;
      }
      .ds-btn-primary::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, transparent 60%);
        pointer-events: none;
      }
      .ds-btn-primary:hover {
        background: var(--ds-gold-warm);
        box-shadow: 0 4px 20px rgba(196,158,48,0.30);
        transform: translateY(-1px);
      }
      .ds-btn-primary:active {
        transform: translateY(0);
        box-shadow: none;
      }

      .ds-btn-ghost {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 11px 20px;
        background: transparent;
        color: rgba(255,255,255,0.52);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
        border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.10);
        cursor: pointer;
        font-family: 'Inter', sans-serif;
        transition: all var(--ds-duration) var(--ds-ease);
      }
      .ds-btn-ghost:hover {
        color: rgba(255,255,255,0.80);
        border-color: rgba(196,158,48,0.22);
        background: rgba(196,158,48,0.04);
      }

      /* ========== BADGE ========== */
      .ds-badge-green {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 9px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--ds-green-light);
        background: rgba(30,107,69,0.12);
        border: 1px solid rgba(30,107,69,0.25);
        padding: 3px 8px;
        border-radius: 20px;
      }
      .ds-badge-green::before {
        content: '';
        width: 5px; height: 5px;
        border-radius: 50%;
        background: var(--ds-green-light);
        animation: ds-pulse-dot 2s ease-in-out infinite;
      }
      @keyframes ds-pulse-dot {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }

      /* ========== WIDGET CARDS (calendário/quick) ========== */
      .ds-widget-card {
        background: var(--ds-surface);
        border: 1px solid rgba(196,158,48,0.12);
        border-radius: 14px;
        overflow: hidden;
        transition: border-color var(--ds-duration) var(--ds-ease);
      }
      .ds-widget-card:hover { border-color: rgba(196,158,48,0.22); }

      /* ========== GLASS CARD (base) ========== */
      .glass-card {
        background: rgba(255,255,255,0.042);
        border: 0.5px solid var(--border-gold);
        border-radius: 14px;
        position: relative;
        overflow: hidden;
        transition: all 0.18s ease;
      }
      .glass-card-no-clip {
        background: rgba(255,255,255,0.042);
        border: 0.5px solid var(--border-gold);
        border-radius: 14px;
        position: relative;
        transition: all 0.18s ease;
      }
      .glass-card::before {
        content: '';
        position: absolute;
        top: 0; left: 15%; right: 15%;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(232,185,74,0.5), transparent);
        opacity: 0;
        transition: opacity 0.18s ease;
        pointer-events: none;
      }
      .glass-card:hover::before { opacity: 1; }
      .glass-card:hover {
        background: rgba(255,255,255,0.06);
        border-color: rgba(210,165,40,0.35);
      }

      /* ========== GLASS VARIANTS ========== */
      .glass-hero-gold {
        background: linear-gradient(140deg, rgba(140,95,8,0.6) 0%, rgba(190,145,25,0.38) 45%, rgba(120,80,5,0.5) 100%);
        border: 1px solid rgba(210,165,40,0.38);
        box-shadow: 0 6px 36px rgba(160,115,10,0.22), inset 0 1px 0 rgba(255,220,80,0.12);
      }
      .glass-hero-gold::before {
        background: linear-gradient(90deg, transparent, rgba(232,185,74,0.6), transparent);
      }
      .glass-hero-green {
        background: linear-gradient(140deg, rgba(15,55,32,0.7) 0%, rgba(20,80,48,0.45) 45%, rgba(12,48,28,0.6) 100%);
        border: 1px solid rgba(30,160,80,0.28);
        box-shadow: 0 6px 36px rgba(15,120,60,0.14), inset 0 1px 0 rgba(60,200,110,0.08);
      }
      .glass-hero-green::before {
        background: linear-gradient(90deg, transparent, rgba(60,200,110,0.35), transparent);
      }
      .glass-blue {
        background: rgba(12,22,65,0.65);
        border-color: rgba(50,90,200,0.22);
      }
      .glass-blue::before { background: linear-gradient(90deg, transparent, rgba(80,120,255,0.4), transparent); }
      .glass-terra {
        background: rgba(45,28,6,0.65);
        border-color: rgba(160,100,15,0.22);
      }
      .glass-terra::before { background: linear-gradient(90deg, transparent, rgba(200,160,40,0.35), transparent); }
      .glass-purple {
        background: rgba(40,10,30,0.4);
        border-color: rgba(140,40,90,0.2);
      }
      .glass-purple::before { background: linear-gradient(90deg, transparent, rgba(180,60,130,0.25), transparent); }

      /* ========== MINI GLASS ========== */
      .glass-mini {
        background: rgba(255,255,255,0.042);
        border: 0.5px solid var(--border-gold);
        border-radius: 12px;
        position: relative;
        overflow: hidden;
        transition: all 0.18s ease;
      }
      .glass-mini::before {
        content: '';
        position: absolute;
        top: 0; left: 20%; right: 20%;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(232,185,74,0.35), transparent);
        opacity: 0;
        transition: opacity 0.18s ease;
        pointer-events: none;
      }
      .glass-mini:hover::before { opacity: 1; }
      .glass-mini:hover {
        background: rgba(255,255,255,0.07);
        border-color: rgba(210,165,40,0.3);
        transform: translateY(-1px);
      }

      /* tint variants for glass-mini */
      .glass-tint-blue {
        background: rgba(10,20,55,0.45);
        border-color: rgba(50,90,200,0.18);
      }
      .glass-tint-wine {
        background: rgba(50,10,35,0.45);
        border-color: rgba(150,40,100,0.18);
      }
      .glass-tint-gold {
        border-color: rgba(210,165,40,0.16);
      }
      .glass-tint-neutral {
        background: rgba(255,255,255,0.038);
      }

      /* ========== SIDEBAR ========== */
      .glass-sidebar {
        background: rgba(255,255,255,0.018);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-right: 0.5px solid rgba(210,165,40,0.06);
      }

      /* ========== TOPBAR ========== */
      .glass-topbar {
        background: rgba(255,255,255,0.018);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-bottom: 0.5px solid rgba(210,165,40,0.14);
      }

      /* ========== GLASS BUTTON ========== */
      .glass-btn {
        background: rgba(255,255,255,0.05);
        border: 0.5px solid rgba(210,165,40,0.2);
        border-radius: 8px;
        transition: all 0.18s ease;
      }
      .glass-btn:hover {
        background: rgba(255,255,255,0.08);
        border-color: rgba(210,165,40,0.3);
      }

      /* ========== SECTION LABEL ========== */
      .section-label {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 8.5px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: rgba(210,165,40,0.38);
        white-space: nowrap;
      }

      /* ========== ANIMAÇÕES RITUAIS ========== */
      @media (prefers-reduced-motion: no-preference) {
        /* --- NAV CARD --- */
        .nav-card {
          transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.28s ease;
          position: relative;
          overflow: hidden;
        }
        .nav-card::after {
          content: '';
          position: absolute;
          top: 0; left: -100%; right: auto;
          width: 60%; height: 1.5px;
          background: linear-gradient(90deg, transparent, var(--cor-tema, #e2b84a), transparent);
          transition: none;
          pointer-events: none;
        }
        .nav-card:hover {
          transform: translateY(-3px);
          box-shadow:
            0 8px 28px rgba(var(--cor-tema-rgb, 210,165,40), 0.2),
            0 0 0 0.5px rgba(var(--cor-tema-rgb, 210,165,40), 0.35),
            inset 0 1px 0 rgba(var(--cor-tema-rgb, 210,165,40), 0.15);
        }
        .nav-card:hover::after {
          animation: luz-corre 0.45s ease forwards;
        }
        .nav-card:hover .nav-icon {
          transform: rotate(6deg) scale(1.12);
          transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
          filter: drop-shadow(0 0 6px var(--cor-tema, #e2b84a));
        }
        @keyframes luz-corre {
          from { left: -60%; }
          to   { left: 110%; }
        }

        /* --- HERO BUTTON --- */
        .hero-btn {
          position: relative;
          overflow: hidden;
          transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s ease;
        }
        .hero-btn::before {
          content: '';
          position: absolute;
          inset: 0;
          background: radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(255,220,80,0.18) 0%, transparent 65%);
          opacity: 0;
          transition: opacity 0.3s ease;
          pointer-events: none;
        }
        .hero-btn:hover::before { opacity: 1; }
        .hero-btn:hover {
          transform: translateY(-4px) scale(1.01);
          box-shadow:
            0 12px 40px rgba(180,130,10,0.35),
            0 0 0 1px rgba(210,165,40,0.5),
            inset 0 1px 0 rgba(255,230,100,0.2);
        }

        /* --- SEMENTE (Opele) --- */
        @keyframes semente-cai {
          0%   { transform: translateY(-40px) rotate(-15deg); opacity: 0; }
          60%  { transform: translateY(4px) rotate(3deg); opacity: 1; }
          80%  { transform: translateY(-2px) rotate(-1deg); }
          100% { transform: translateY(0) rotate(var(--rot-final, 0deg)); opacity: 1; }
        }
        .semente {
          animation: semente-cai 0.55s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
          animation-delay: calc(var(--i,0) * 0.07s);
        }
        .semente:hover {
          transform: scale(1.08) translateY(-2px);
          filter: brightness(1.15) drop-shadow(0 4px 8px rgba(210,165,40,0.3));
          transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
          cursor: pointer;
        }

        /* --- MERINDILOGUN — TAPETE + BUZIOS --- */
        @keyframes treme-tapete {
          0%,100% { transform: translateX(0) rotate(0); }
          20%  { transform: translateX(-5px) rotate(-1deg); }
          40%  { transform: translateX(5px) rotate(1deg); }
          60%  { transform: translateX(-4px) rotate(-0.5deg); }
          80%  { transform: translateX(4px) rotate(0.5deg); }
        }
        @keyframes cai-buzio {
          0%   { transform: translate(0, -120px) rotate(var(--rot,0deg)) scale(0.7); opacity: 0; }
          55%  { transform: translate(0, 5px) rotate(calc(var(--rot,0deg) * 0.6)) scale(1.04); opacity: 1; }
          75%  { transform: translate(0, -3px) rotate(var(--rot,0deg)); }
          100% { transform: translate(0, 0) rotate(var(--rot,0deg)); opacity: 1; }
        }
        @keyframes glow-tapete {
          0%,100% {
            box-shadow:
              inset 0 0 50px rgba(80,40,10,0.45),
              0 6px 24px rgba(0,0,0,0.55);
          }
          50% {
            box-shadow:
              inset 0 0 50px rgba(80,40,10,0.45),
              0 6px 24px rgba(0,0,0,0.55),
              0 0 35px rgba(210,165,40,0.22);
          }
        }
        @keyframes aparece-odu {
          from { transform: scale(0.6) translateY(8px); opacity: 0; }
          to   { transform: scale(1) translateY(0); opacity: 1; }
        }

        /* --- IKIN --- */
        @keyframes ikin-transfere {
          0%   { transform: translateX(0) scale(1); }
          30%  { transform: translateX(var(--dx,40px)) scale(0.9) rotate(var(--dr,10deg)); }
          70%  { transform: translateX(var(--dx,40px)) scale(1.05); }
          100% { transform: translateX(0) scale(1); }
        }
        .ikin:active {
          animation: ikin-transfere 0.45s cubic-bezier(0.25,0.46,0.45,0.94);
        }
        .ikin:hover {
          filter: brightness(1.18) drop-shadow(0 2px 8px rgba(180,130,10,0.4));
          transform: scale(1.06);
          transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
        }

        /* --- MARCA ODU (Opon) --- */
        @keyframes marca-aparece {
          0%   { opacity: 0; transform: scale(0.6) rotate(-10deg); }
          60%  { opacity: 1; transform: scale(1.08) rotate(2deg); }
          100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }
        .marca-odu {
          animation: marca-aparece 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
        }
        @keyframes particula {
          0%   { transform: translate(0,0); opacity: 0.7; }
          100% { transform: translate(var(--dx),var(--dy)); opacity: 0; }
        }

        /* --- VOZ DO TROVÃO --- */
        .voz-trovao {
          position: relative;
          overflow: hidden;
          transition: transform 0.2s ease, box-shadow 0.3s ease;
          animation: trovao-pulsa 2.5s ease-in-out infinite;
        }
        .voz-trovao:hover {
          transform: scale(1.01);
          box-shadow:
            0 0 40px rgba(200,50,50,0.3),
            0 0 80px rgba(200,50,50,0.1),
            inset 0 1px 0 rgba(255,100,100,0.2);
        }
        @keyframes trovao-pulsa {
          0%, 100% { box-shadow: 0 0 20px rgba(200,50,50,0.2); }
          50%      { box-shadow: 0 0 45px rgba(200,50,50,0.45); }
        }
        @keyframes flash-trovao {
          0%   { opacity: 1; }
          100% { opacity: 0; }
        }

        /* --- ODU SELECTED GLOW --- */
        @keyframes glow-sagrado {
          0%, 100% {
            box-shadow: 0 0 0 1px rgba(210,165,40,0.5), 0 0 15px rgba(210,165,40,0.2);
          }
          50% {
            box-shadow: 0 0 0 1.5px rgba(210,165,40,0.8), 0 0 28px rgba(210,165,40,0.38), 0 0 50px rgba(210,165,40,0.12);
          }
        }
        .card-selecionado {
          animation: glow-sagrado 2s ease-in-out infinite;
        }
      }

      /* === MERINDILOGUN — CLASS RULES === */
      .merindilogun-page {
        background: #0c0810;
        min-height: 100vh;
        position: relative;
      }
      .merindilogun-page::before {
        content: '';
        position: absolute; inset: 0; pointer-events: none;
        background:
          radial-gradient(ellipse 60% 50% at 50% 100%,
            rgba(180,100,200,0.10) 0%, transparent 70%),
          radial-gradient(ellipse 40% 30% at 50% 0%,
            rgba(210,165,40,0.08) 0%, transparent 60%);
      }
      .tapete {
        position: relative;
        width: 100%;
        padding-bottom: 66%;
        background: #c8a878;
        border-radius: 14px;
        border: 2px solid rgba(140,90,30,0.5);
        box-shadow:
          inset 0 0 50px rgba(80,40,10,0.45),
          inset 0 0 20px rgba(60,30,5,0.3),
          0 6px 24px rgba(0,0,0,0.55);
        overflow: hidden;
      }
      .tapete::before {
        content: '';
        position: absolute; inset: 0;
        background-image:
          repeating-linear-gradient(0deg,
            rgba(100,60,20,0.12) 0px, transparent 1px, transparent 8px),
          repeating-linear-gradient(90deg,
            rgba(100,60,20,0.12) 0px, transparent 1px, transparent 8px);
        border-radius: 12px;
        pointer-events: none;
      }
      .tapete.tremendo {
        animation: treme-tapete 0.4s ease-in-out;
      }
      .tapete.revelado {
        animation: glow-tapete 2.5s ease-in-out infinite;
      }
      .buzio {
        position: absolute;
        width: 52px; height: 36px;
        cursor: pointer;
        transition: filter 0.2s ease, transform 0.15s ease;
        will-change: transform;
        z-index: 2;
      }
      .buzio.caindo {
        animation: cai-buzio 0.55s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
        pointer-events: none;
      }
      .buzio:not(.caindo):hover {
        filter: brightness(1.18) drop-shadow(0 3px 10px rgba(210,165,40,0.5));
        transform: rotate(var(--rot,0deg)) translateY(-2px) scale(1.06);
      }
      .buzio:not(.caindo):active {
        transform: rotate(var(--rot,0deg)) scale(0.95);
      }
      .buzio svg {
        width: 100%; height: 100%;
        display: block;
      }
      .odu-card {
        text-align: center;
        padding: 16px 0;
      }
      .odu-card .odu-numero {
        font-family: 'Cinzel', serif;
        font-size: 48px;
        font-weight: 700;
        color: #e2b84a;
        line-height: 1;
        text-shadow: 0 0 30px rgba(210,165,40,0.25);
        animation: aparece-odu 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
      }
      .odu-card .odu-nome {
        font-family: 'Cinzel', serif;
        font-size: 18px;
        font-weight: 600;
        color: #f0e6d0;
        margin-top: 4px;
      }
      .odu-card .odu-energia {
        font-family: 'Cormorant Garamond', serif;
        font-style: italic;
        font-size: 14px;
        color: rgba(210,165,40,0.65);
        margin-top: 2px;
      }
      .odu-card.vazio .odu-numero {
        font-size: 14px;
        color: rgba(255,255,255,0.3);
        font-family: 'Inter', sans-serif;
        font-weight: 400;
        text-shadow: none;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      .btn-jogar {
        width: 100%;
        background: linear-gradient(135deg,
          rgba(150,100,8,0.88), rgba(195,148,18,0.78));
        border: 1px solid rgba(210,165,40,0.5);
        border-radius: 50px;
        padding: 14px 0;
        font-family: 'Cinzel', serif;
        font-size: 13px;
        font-weight: 700;
        color: #1a0e00;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer;
        box-shadow:
          0 4px 20px rgba(150,100,8,0.35),
          inset 0 1px 0 rgba(255,220,80,0.2);
        transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1),
                    box-shadow 0.2s ease;
      }
      .btn-jogar:hover:not(:disabled) {
        transform: translateY(-3px) scale(1.01);
        box-shadow:
          0 8px 28px rgba(150,100,8,0.5),
          inset 0 1px 0 rgba(255,220,80,0.3);
      }
      .btn-jogar:active:not(:disabled) {
        transform: translateY(-1px) scale(0.99);
      }
      .btn-jogar:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* Mobile hover reduction */
      @media (hover: none) {
        .nav-card:hover { transform: none !important; }
        .hero-btn:hover { transform: none !important; }
        .buzio:not(.caindo):hover {
          filter: none !important;
          transform: rotate(var(--rot,0deg)) !important;
        }
        .ikin:hover { transform: none !important; }
        .btn-jogar:hover { transform: none !important; }
      }

      /* Legacy styles preserved */
      .btn-raio-ritual {
          width: 45px; height: 45px;
          border-radius: 50%;
          background: radial-gradient(circle, #FFD700, #B8860B);
          border: 2px solid #FFF;
          font-size: 24px;
          box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
          z-index: 50;
          display: flex;
          align-items: center;
          justify-content: center;
          cursor: pointer;
          animation: pulse-gold 2s infinite;
          transition: transform 0.2s;
      }
      .btn-raio-ritual:active { transform: scale(0.9); }
      .ouvindo-ativo {
          background-color: #28a745 !important;
          border-color: #28a745 !important;
          box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.7);
          animation: respirar 1.5s infinite cubic-bezier(0.66, 0, 0, 1);
      }
      @keyframes respirar {
          0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.7); }
          70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(40, 167, 69, 0); }
          100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(40, 167, 69, 0); }
      }
      @keyframes pulse-gold {
          0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.7); }
          50% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(255, 215, 0, 0); }
          100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); }
      }

      /* --- PRINT STYLES CORRECTION --- */
      @media print {
        body * {
          visibility: hidden; /* Hide everything by default */
        }
        
        /* Elements specifically marked to print become visible */
        .print\:block, 
        .print\:flex,
        #printable-area, 
        #printable-area * {
          visibility: visible;
        }

        /* Ensure modals take full page and flow naturally */
        #printable-modal {
          position: absolute !important;
          left: 0 !important;
          top: 0 !important;
          width: 100% !important;
          height: auto !important;
          overflow: visible !important;
          background: white !important;
          color: black !important;
          z-index: 9999 !important;
          margin: 0 !important;
          padding: 0 !important;
        }

        /* Reset body backgrounds to save ink */
        body {
          background: white !important;
          color: black !important;
          overflow: visible !important;
        }

        /* Hide scrollbars and UI elements */
        ::-webkit-scrollbar { display: none; }
        
        /* Ensure page breaks work */
        .break-before-page { page-break-before: always; }
        .break-inside-avoid { page-break-inside: avoid; }
      }
    </style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          if (location.hostname.includes('localhost')) {
            navigator.serviceWorker.getRegistrations().then(rs => rs.forEach(r => r.unregister()));
            caches.keys().then(ks => ks.forEach(k => caches.delete(k)));
          } else {
            navigator.serviceWorker.register('./service-worker.js?v=mqv5xv0a')
              .then(registration => console.log('SW registered'))
              .catch(err => console.log('SW failed', err));
          }
        });
      }
    </script>
  </body>
