
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <script type="importmap">
    {
      "imports": {
        "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
        "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.3",
        "react/": "https://esm.sh/react@^19.2.4/",
        "react": "https://esm.sh/react@^19.2.4",
        "@google/genai": "https://esm.sh/@google/genai@^1.40.0",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "vite": "https://esm.sh/vite@^7.3.1",
        "jszip": "https://esm.sh/jszip@^3.10.1",
        "@capacitor/cli": "https://esm.sh/@capacitor/cli@^8.0.2"
      }
    }
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1510" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ifá Oluwo">
    
    <title>Ifá Oluwo - Codex Sacerdotal</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3758/3758866.png" />
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3758/3758866.png" />


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: ['class', '[data-theme="dark"]'],
        theme: {
          extend: {
            fontFamily: {
              serif: ['Cinzel', 'serif'],
              sans: ['Lato', 'sans-serif'],
            },
            colors: {
              'ifa-base': 'var(--color-bg)',
              'ifa-base-dark': 'var(--color-bg-dark)',
              'ifa-surface': 'var(--color-surface)',
              'ifa-gold': 'var(--color-gold)',
              'ifa-wood': 'var(--color-wood)',
              'ifa-neutral': 'var(--color-neutral)',
              'ifa-text': 'var(--color-text)',
              'ifa-text-light': 'var(--color-text-light)',
              'ifa-border': 'var(--color-border)',
            },
            padding: {
              'safe-top': 'env(safe-area-inset-top)',
              'safe-bottom': 'env(safe-area-inset-bottom)',
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --color-bg: #1a1510;
        --color-bg-dark: #0f0c08;
        --color-surface: #2a2420;
        --color-gold: #D4AF37;
        --color-wood: #5D4037;
        --color-neutral: #a8a29e;
        --color-text: #F5F5DC;
        --color-text-light: #e5e5e5;
        --color-border: #5D4037;
        /* Safe Area Defaults */
        --sat: env(safe-area-inset-top);
        --sab: env(safe-area-inset-bottom);
      }
      [data-theme='light'] {
        --color-bg: #F2EFE9;
        --color-bg-dark: #E6E0D4;
        --color-surface: #FFFFFF;
        --color-gold: #B08D26;
        --color-wood: #8D6E63;
        --color-neutral: #5D4037;
        --color-text: #3E2723;
        --color-text-light: #4E342E;
        --color-border: #A1887F;
      }
      body {
        background-color: var(--color-bg);
        color: var(--color-text-light);
        transition: background-color 0.3s ease, color 0.3s ease;
        overscroll-behavior-y: none;
        padding-top: var(--sat);
        padding-bottom: var(--sab);
      }
      /* Fix for sticky headers on iOS */
      .sticky-safe {
        position: sticky;
        top: var(--sat);
      }
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: var(--color-bg); }
      ::-webkit-scrollbar-thumb { background: var(--color-wood); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--color-gold); }

      /* --- BOTÃO RAIO RITUAL (MODO GUIADO) --- */
      .btn-raio-ritual {
          width: 45px; 
          height: 45px;
          border-radius: 50%;
          background: radial-gradient(circle, #FFD700, #B8860B);
          border: 2px solid #FFF;
          font-size: 24px;
          box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
          z-index: 50;
          display: flex;
          align-items: center;
          justify-content: center;
          cursor: pointer;
          animation: pulse-gold 2s infinite;
          transition: transform 0.2s;
      }
      .btn-raio-ritual:active {
          transform: scale(0.9);
      }

      /* --- MICROFONE PULSANTE (RESPIRAÇÃO) --- */
      .ouvindo-ativo {
          background-color: #28a745 !important; /* Verde Aceso */
          border-color: #28a745 !important;
          box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.7);
          animation: respirar 1.5s infinite cubic-bezier(0.66, 0, 0, 1);
      }
      
      @keyframes respirar {
          0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.7); }
          70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(40, 167, 69, 0); }
          100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(40, 167, 69, 0); }
      }

      @keyframes pulse-gold {
          0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.7); }
          50% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(255, 215, 0, 0); }
          100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); }
      }

      /* --- PRINT STYLES CORRECTION --- */
      @media print {
        body * {
          visibility: hidden; /* Hide everything by default */
        }
        
        /* Elements specifically marked to print become visible */
        .print\:block, 
        .print\:flex,
        #printable-area, 
        #printable-area * {
          visibility: visible;
        }

        /* Ensure modals take full page and flow naturally */
        #printable-modal {
          position: absolute !important;
          left: 0 !important;
          top: 0 !important;
          width: 100% !important;
          height: auto !important;
          overflow: visible !important;
          background: white !important;
          color: black !important;
          z-index: 9999 !important;
          margin: 0 !important;
          padding: 0 !important;
        }

        /* Reset body backgrounds to save ink */
        body {
          background: white !important;
          color: black !important;
          overflow: visible !important;
        }

        /* Hide scrollbars and UI elements */
        ::-webkit-scrollbar { display: none; }
        
        /* Ensure page breaks work */
        .break-before-page { page-break-before: always; }
        .break-inside-avoid { page-break-inside: avoid; }
      }
    </style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./service-worker.js')
            .then(registration => console.log('SW registered'))
            .catch(err => console.log('SW failed', err));
        });
      }
    </script>
  </body>
</html>
